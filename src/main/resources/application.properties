spring.application.name=registration
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.datasource.url=jdbc:postgresql://localhost:5432/car_db
spring.datasource.username=car_user
spring.datasource.password=car_pass
spring.datasource.hikari.initialization-fail-timeout=-1

spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
server.servlet.context-path=/cardpgbackend
frontend.urls=${FRONTEND_URLS:http://localhost:5173}

#Configs geo-calculation

## REPLACE base-url WITH PROD URL
cardpg.engine.base-url=https://dev.publicar.youxgroup.com.br/engine/api
cardpg.engine.workflow=CAR_DPG
cardpg.engine.timeout.connect-ms=3000
cardpg.engine.timeout.read-ms=60000



management.endpoints.web.exposure.include=health
management.endpoints.web.base-path=/actuator
management.endpoint.health.enabled=true
management.endpoint.health.show-details=always