# Configurações para testes
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.flyway.enabled=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Propriedades necessárias para o contexto
HASH_PREFIX=TEST
frontend.urls=http://localhost:3000
server.servlet.context-path=/test

# Propriedades para ReceiptGenerator
DEFAULT_LOCATION_ZONE=UTC
GENERAL_INFORMATION_RECEIPT_PATH=reports/GENERAL_INFORMATION.txt
REPORT_PARAMS_RECEIPT_JSON=reports/report_params.json
RECEIPT_LOGO_PATH=images/govbr.svg