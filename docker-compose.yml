  core-backend:
    image: rer-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: core-backend
    depends_on:
      - core-backend-db
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://core-backend-db:5432/car_db"
      SPRING_DATASOURCE_USERNAME: car_user
      SPRING_DATASOURCE_PASSWORD: car_pass
      FRONTEND_URLS: http://localhost,http://localhost:5173
      HASH_PREFIX: BR
      RECEIPT_LOGO_PATH: images/govbr.svg
      WATERMARK_IMAGE_PATH: images/unofficial.svg
      GENERAL_INFORMATION_RECEIPT_PATH: reports/GENERAL_INFORMATION.txt
      REPORT_PARAMS_RECEIPT_JSON: reports/report_params.json
      DEFAULT_LOCATION_ZONE: Europe/London
      HTTP_PROXY: 
      HTTPS_PROXY: 
      NO_PROXY: 
    networks:
      - core-backend-network
      - gateway_network

networks:
  core-backend-network:
    driver: bridge

volumes:
  car-db-data:
