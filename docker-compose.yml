services:
  core-backend-db:
    image: postgis/postgis:latest
    container_name: core-backend-db
    environment:
      POSTGRES_DB: car_db
      POSTGRES_USER: car_user
      POSTGRES_PASSWORD: car_pass
    ports:
      - "5432:5432"
    volumes:
      - car-db-data:/var/lib/postgresql/data
    networks:
      - core-backend-network

